<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 960 540" version="1.1">
  <defs>
    <linearGradient id="gi-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="gi-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="960" height="540" fill="url(#gi-bg)"/>

  <!-- connecting edges -->
  <g stroke="url(#gi-edge)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8">
    <line x1="480" y1="270" x2="300" y2="150"/>
    <line x1="480" y1="270" x2="660" y2="150"/>
    <line x1="480" y1="270" x2="300" y2="390"/>
    <line x1="480" y1="270" x2="660" y2="390"/>
    <line x1="480" y1="270" x2="480" y2="120"/>
    <line x1="300" y1="150" x2="150" y2="200"/>
    <line x1="660" y1="150" x2="810" y2="200"/>
    <line x1="300" y1="390" x2="150" y2="340"/>
    <line x1="660" y1="390" x2="810" y2="340"/>
    <line x1="300" y1="150" x2="480" y2="120"/>
    <line x1="660" y1="150" x2="480" y2="120"/>
  </g>

  <!-- satellite nodes -->
  <g fill="#a5b4fc">
    <circle cx="150" cy="200" r="14"/>
    <circle cx="810" cy="200" r="14"/>
    <circle cx="150" cy="340" r="14"/>
    <circle cx="810" cy="340" r="14"/>
  </g>
  <g fill="url(#gi-edge)">
    <circle cx="300" cy="150" r="20"/>
    <circle cx="660" cy="150" r="20"/>
    <circle cx="300" cy="390" r="20"/>
    <circle cx="660" cy="390" r="20"/>
    <circle cx="480" cy="120" r="16"/>
  </g>

  <!-- central node -->
  <circle cx="480" cy="270" r="34" fill="#1e1b3a"/>
  <circle cx="480" cy="270" r="34" fill="none" stroke="url(#gi-edge)" stroke-width="3"/>

  <text x="480" y="470" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#1e1b3a">Graph<tspan fill="#14b8a6">It</tspan></text>
</svg>

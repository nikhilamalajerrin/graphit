# Embeddings.  Memory-hungry — fastembed loads an ML model at startup.
# Keep isolated from other groups so its memory footprint and restart
# latency don't affect siblings.

_defaults: &defaults
  pubsub_backend: rabbitmq
  rabbitmq_host: localhost
  log_level: INFO

processors:

  - class: graphit.embeddings.fastembed.Processor
    params:
      <<: *defaults
      id: embeddings
      concurrency: 1

  - class: graphit.embeddings.document_embeddings.Processor
    params:
      <<: *defaults
      id: document-embeddings

  - class: graphit.embeddings.graph_embeddings.Processor
    params:
      <<: *defaults
      id: graph-embeddings

  - class: graphit.embeddings.row_embeddings.Processor
    params:
      <<: *defaults
      id: row-embeddings
